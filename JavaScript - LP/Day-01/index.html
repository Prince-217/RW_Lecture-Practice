<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./demo.js"></script>
</head>

<body>
    <h1 id="heading">Hello World</h1>

    <script src="./script.js"></script>

    <script>
        console.log("Hello Javascript!!");
        document.getElementById("heading").innerHTML = "Hello Javascript!!"
        document.write(10 + 20)

        document.getElementById("heading").innerHTML = "Hello Prince ... !!"
        
        for (let i = 1; i <= 5; i++) {
            document.write("<h1>Prince Bhai</h1>" + i)
            document.write("<h2>Prince Bhai</h2>" + i)
            document.write("<h3>Prince Bhai</h3>" + i)
            document.write("<h4>Prince Bhai</h4>" + i)
            document.write("<h5>Prince Bhai</h5>" + i)
            document.write("<h6>Prince Bhai</h6>" + i)
            console.log("Iteration number: "+i);
        }
    </script>
</body>

</html>
