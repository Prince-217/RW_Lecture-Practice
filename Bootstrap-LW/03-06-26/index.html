<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Modern Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="premium-card">

            <div class="text-center mb-5">
                <span class="badge bg-indigo-subtle text-wrap mb-2"
                    style="background-color: rgba(99, 102, 241, 0.2); color: #a5b4fc; padding: 6px 16px; border-radius: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Secure
                    Registration</span>
                <h2 class="fw-bold text-white mt-2">Complete Profile</h2>
                <p style="color: #94a3b8;">Set up your premium dashboard credentials.</p>
            </div>

            <form action="#" method="POST">

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label" for="firstName"><i class="bi bi-person me-2"></i>First Name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="e.g., Alex" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input type="text" class="form-control" id="lastName" placeholder="e.g., Mercer" required>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-7">
                        <label class="form-label" for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="alex@example.com" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label" for="phone"><i class="bi bi-telephone me-2"></i>Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label" for="accountType"><i class="bi bi-shield-check me-2"></i>Account
                            Tier</label>
                        <select class="form-select" id="accountType" required>
                            <option selected disabled value="">Select tier...</option>
                            <option value="standard">Standard Access</option>
                            <option value="premium">Premium Pro</option>
                            <option value="enterprise">Enterprise VIP</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="dob"><i class="bi bi-calendar3 me-2"></i>Date of Birth</label>
                        <input type="date" class="form-control" id="dob" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="biography"><i class="bi bi-file-earmark-text me-2"></i>Short
                        Biography</label>
                    <textarea class="form-control" id="biography" rows="3"
                        placeholder="Tell us about yourself or your team..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block mb-2"><i class="bi bi-bell me-2"></i>Notification Frequency</label>
                    <div class="d-flex gap-4 flex-wrap">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="notifyFreq" id="freqInstant" checked>
                            <label class="form-check-label text-white-50" for="freqInstant">Instant</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="notifyFreq" id="freqDaily">
                            <label class="form-check-label text-white-50" for="freqDaily">Daily Summary</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="notifyFreq" id="freqNever">
                            <label class="form-check-label text-white-50" for="freqNever">Mute All</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="avatarUpload"><i class="bi bi-cloud-arrow-up me-2"></i>Upload Profile
                        Artwork / Identity</label>
                    <input type="file" class="form-control" id="avatarUpload">
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                    <label class="form-check-label small" for="termsCheck" style="color: #94a3b8;">
                        I verify that all provided telemetry details are accurate.
                    </label>
                </div>

                <button class="btn btn-premium w-100 py-3 fs-5" type="submit">
                    Initialize Account <i class="bi bi-arrow-right ms-2"></i>
                </button>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
