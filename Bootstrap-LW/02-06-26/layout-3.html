<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout-3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/ly-3.css">
</head>
<body>
    <!-- Layout - 3  -->

    <h1>Layout - 3</h1>

    <div class="row row-1">
        <div class="col m-4">content</div>
    </div>

    <div class="row row-2 gx-3 row-cols-sm-1 row-cols-md-2 row-cols-lg-4">
        <div class="col">
            <div class="m-3">content</div>
        </div>
        <div class="col">
            <div class="m-3">content</div>
        </div>
        <div class="col">
            <div class="m-3">content</div>
        </div>
        <div class="col">
            <div class="m-3">content</div>
        </div>
    </div>
    
    <div class="row row-3 gx-3 row-cols-sm-1 row-cols-md-2">
        <div class="col">
            <div class="m-3">content</div>
        </div>
        <div class="col">
            <div class="m-3">content</div>
        </div>
    </div>
    
    <div class="row row-4 gx-3">
        <div class="col">
            <div class="m-3">content</div>
        </div>
    </div>

</body>
</html>
