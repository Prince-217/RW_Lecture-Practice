<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout-4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/ly-4.css">
</head>

<body>
    <!-- Layout - 4 -->

    <h1>Layout - 4</h1>

    <div class="row row-1">
        <div class="col-lg-4 p-3">HEADER</div>
        <div class="col-sm-12 col-lg-8 p-3 d-sm-block d-md-none d-lg-block">MENU</div>
    </div>
    <div class="row row-2">
        <div class="col">HERO</div>
    </div>
    <div class="row row-3">
        <div class="col d-sm-none d-md-block d-lg-none col-md-4">MENU</div>
        <div class="col p-0 col-md-8 col-lg-12">
            <div class="row p-0 row-cols-sm-1 row-cols-lg-2">
                <div class="col col-sm-12">MAIN</div>
                <div class="col p-0 d-sm-none d-lg-block">
                    <div class="row p-0">
                        <div class="col col-6"></div>
                        <div class="col col-6 p-0">
                            <div class="row row-cols-1 p-0">
                                <div class="col">IMAGES</div>
                                <div class="col">EXTRA</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col d-md-block d-lg-none">BANNER</div>
                <div class="col p-0 d-md-block d-lg-none">
                    <div class="row p-0 row-cols-sm-1">
                        <div class="col">EXTRA</div>
                        <div class="col">IMAGE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row row-4">
        <div class="col d-sm-none d-lg-block">BANNER</div>
    </div>
</body>

</html>
