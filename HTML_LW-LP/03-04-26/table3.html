<!Doctype html>
<html lang="EN-US">
	<head>
		<meta charset="UTF-8">
		<title>
			Table-3
		</title>
		<style>
			th{
				background-color: teal;
			}
			td{
				text-align: center;
			}
		</style>
	</head>
	<body>
		<h1>Table-3</h1>
		<table border>
			<thead>
				<tr>
					<th>Device</th>
					<th>Brand</th>
					<th colspan="2">Specifications</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td rowspan="3">Smartphone</td>
					<td rowspan="3">Apple</td>
					<td style="background-color: yellow">Model</td>
					<td style="background-color: yellow">Storage</td>
				</tr>
				<tr>
					<td>iPhone 12pro</td>
					<td>256GB</td>
				</tr>
				<tr>
					<td>iPhone SE</td>
					<td>128GB</td>
				</tr>
				<tr>
					<td>Laptop</td>
					<td>HP</td>
					<td colspan="2">15.6"inch Dispaly</td>
				</tr>
				<tr>
					<td>Tablet</td>
					<td>Samsung</td>
					<td colspan="2">10.5"inch Dispaly</td>
				</tr>
			</tbody>
		</table>
	</body>
</html>
