<!doctype html>
<html lang="EN-US">
	<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=divice-width, initial-scale=1.0">
		<title>
			INDEX
		</title>
	</head>
	<body>
		
		<!--HTML Form-->
		
		<form onsubmit="" action="">
			<fieldset>
				<legend>HTML Form</legend>
				<div>
					<label for="name">Enter your name : </label>
					<input type="text" placeholder="Enter name" required/>
				</div><br>
				<div>
					<label for="age">Enter your age : </label>
					<input type="number" placeholder="Enter Age" readonly/>
				</div><br>
				<div>
					<label for="dob">Enter Birth Date : </label>
					<input type="date" placeholder="Enter DOB" required/>
				</div><br>
				<div>
					<label for="aboutself">Tell About Yourself : </label>
					<textarea placeholder="Enter Text here..." disabled></textarea>
				</div><br><br>
				<div><button type="Submit">Submit</button></div>
			</fieldset>
		</form>
		
		<!--Figure tag-->
		
		<figure style="width: 500px">
			<img src="https://img.freepik.com/free-photo/traveller-forest-is-taking-pictures_23-2148258805.jpg?semt=ais_hybrid&w=740&q=80" alt="Image" width="500px">
			
			<figcaption style="text-align: center">A girl With Camera</figcaption>
		</figure>
		
	</body>
</html>
