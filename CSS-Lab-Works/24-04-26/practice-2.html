<!DOCTYPE html>

    <link rel="stylesheet" href="./assets/css/style-2.css">
</head>
<body>
    
    <!-- Apply CSS only on @ -->

    <header>
        <nav>
            <a href="#" target="_blank">@ Home</a>
            <a href="#">About</a>
            <a href="#" target="_self">@ Contact</a>

        <img src="img1.jpg" alt="nature @">

        <p class="info">@ This is info paragraph</p>

        <p class="info-data">@ Mixed class paragraph</p>
    </div>

    <div>
        <a href="https://example.com">@ External Link</a>
        <a href="page.html">Internal Link</a>
        <a href="https://test.com">@ Another External</a>
