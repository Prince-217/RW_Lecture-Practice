<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>INDEX</title>
</head>
<body>
    
    <!-- Object-fit / Object-Position -->


    
    <h1>Object-fit Property :-</h1>
    <div class="obft-pro">
        <div class="pr-bx of-cover">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-fit: cover</h3>
        </div>
        <div class="pr-bx of-contain">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-fit: contain</h3>
        </div>
        <div class="pr-bx of-fill">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-fit: fill</h3>
        </div>
        <div class="pr-bx of-none">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-fit: none</h3>
        </div>
        <div class="pr-bx of-scdwn">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-fit: scale-down</h3>
        </div>
    </div>
    <br>
    <br>

    <h1>Object Position Property :- </h1>

    <div class="obpo-pro">
        <div class="pr-bx ob-ps1">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-position: 10px 20px</h3>
        </div>
        <div class="pr-bx ob-ps2">
            <img src="./assets/images/Blog-Image-50.jpg" alt="img">
            <h3>object-position: 40% 5%</h3>
        </div>
    </div>
    <br>
    <br>
    <br>

    <h1>CSS Overlay Effect :- </h1><br><br>

    <div class="mn-layer">
        <div class="overlay"></div>
        <img src="./assets/images/Blog-Image-50.jpg" alt="img">
    </div>
</body>
</html>
